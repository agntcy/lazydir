version: "3"

vars:
  BIN_DIR: ./.bin
  BINARY: "{{ .BIN_DIR }}/lazydir"
  GOLANGCI_LINT_VERSION: "2.11.3"
  GOLANGCI_LINT_BIN: "{{ .BIN_DIR }}/golangci-lint-{{ .GOLANGCI_LINT_VERSION }}"
  DIRCTL_VERSION: "1.3.0"
  DIRCTL_BIN: "{{ .BIN_DIR }}/dirctl"

tasks:
  default:
    desc: Show available tasks
    cmd: task --list

  deps:
    desc: Download Go module dependencies
    cmds:
      - go mod download
    sources:
      - go.mod
      - go.sum

  build:
    desc: Build the lazydir binary into .bin/
    deps: [deps]
    cmds:
      - mkdir -p {{ .BIN_DIR }}
      - go build -o {{ .BINARY }} .
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{ .BINARY }}"

  run:
    desc: Build and start lazydir for testing (pass extra args via CLI_ARGS)
    deps: [build]
    cmds:
      - "{{ .BINARY }} {{ .CLI_ARGS }}"

  fmt:
    desc: Format Go source files
    cmds:
      - gofmt -s -w .

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  lint:
    desc: Run golangci-lint
    deps:
      - deps:golangci-lint
    vars:
      LINT_BIN: "{{ .ROOT_DIR }}/{{ .GOLANGCI_LINT_BIN }}"
    cmds:
      - "{{ .LINT_BIN }} run ./..."

  license:
    desc: Run license check
    cmds:
      - licensei cache
      - licensei check

  test:
    desc: Run all tests
    cmds:
      - task: test:unit
      - task: test:e2e

  test:unit:
    desc: Run unit tests
    cmds:
      - go test -count=1 ./...

  test:cover:
    desc: Run unit tests with coverage report
    cmds:
      - go test -race -coverprofile=coverage.out ./...

  test:e2e:
    desc: Run end-to-end tests (starts dirctl daemon automatically)
    deps:
      - deps:dirctl
    vars:
      _DIRCTL: "{{ .ROOT_DIR }}/{{ .DIRCTL_BIN }}"
    env:
      DIRCTL_BIN: "{{ ._DIRCTL }}"
    cmds:
      - |
        set -eu
        cleanup() { "{{ ._DIRCTL }}" daemon stop >/dev/null 2>&1 || true; }
        trap cleanup EXIT
        "{{ ._DIRCTL }}" daemon stop >/dev/null 2>&1 || true
        sleep 1
        "{{ ._DIRCTL }}" daemon start >/dev/null 2>&1 &
        for i in $(seq 1 30); do
          "{{ ._DIRCTL }}" daemon status >/dev/null 2>&1 && break
          sleep 1
        done
        "{{ ._DIRCTL }}" daemon status >/dev/null 2>&1 || { echo "ERROR: daemon failed to start" >&2; exit 1; }
        cd tests/e2e && go test -v -count=1 -timeout 120s ./...

  check:
    desc: Run all checks (fmt, vet, lint, unit+e2e tests) then build
    cmds:
      - task: fmt
      - task: vet
      - task: lint
      - task: test:unit
      - task: test:e2e
      - task: build

  deps:install:
    desc: Install development dependencies and git hooks
    cmds:
      - pre-commit install
    status:
      - test -f .git/hooks/pre-commit

  deps:bin-dir:
    internal: true
    cmds:
      - mkdir -p {{ .BIN_DIR }}
    status:
      - test -d {{ .BIN_DIR }}

  deps:dirctl:
    desc: Download dirctl binary
    internal: true
    deps:
      - deps:bin-dir
    vars:
      DIRCTL_OS:
        sh: uname -s | tr '[:upper:]' '[:lower:]'
      DIRCTL_ARCH:
        sh: uname -m | sed 's/x86_64/amd64/' | sed 's/aarch64/arm64/'
      DIRCTL_SHA256:
        sh: |
          set -eu
          case "{{ .DIRCTL_OS }}-{{ .DIRCTL_ARCH }}" in
            darwin-amd64) echo "edca017b72bd6f6d6169413f2e95fe5b6f5e42b218f52de25e64346020e09a31" ;;
            darwin-arm64) echo "f33ab1ef9ae600dc904c454bf8374acea00561abac5b3531e0045a3d124ecc14" ;;
            linux-amd64) echo "311f6d56c0497282a922844fc7f7053204fec125297931de69f8b26e9ed8ee6d" ;;
            linux-arm64) echo "b948525d729a80ff7101c77a3db69c4e537e34d392f000d8c7b5ed4f0a805776" ;;
            windows-amd64) echo "4f3e7bcccbbbbf49ebd0b9c72a55d23ca17d8f6f2dbd595a979f4cd6929259c2" ;;
            *)
              echo "Unsupported dirctl target: {{ .DIRCTL_OS }}-{{ .DIRCTL_ARCH }}" >&2
              exit 1
              ;;
          esac
    cmds:
      - >-
        curl -sSfL
        "https://github.com/agntcy/dir/releases/download/v{{ .DIRCTL_VERSION }}/dirctl-{{ .DIRCTL_OS }}-{{ .DIRCTL_ARCH }}"
        -o "{{ .DIRCTL_BIN }}"
      - |
        set -eu
        if command -v sha256sum >/dev/null 2>&1; then
          actual="$(
            sha256sum "{{ .DIRCTL_BIN }}" | awk '{print $1}'
          )"
        else
          actual="$(
            shasum -a 256 "{{ .DIRCTL_BIN }}" | awk '{print $1}'
          )"
        fi
        if [ "$actual" != "{{ .DIRCTL_SHA256 }}" ]; then
          rm -f "{{ .DIRCTL_BIN }}"
          echo "ERROR: dirctl checksum mismatch for {{ .DIRCTL_OS }}-{{ .DIRCTL_ARCH }}" >&2
          echo "expected {{ .DIRCTL_SHA256 }}, got $actual" >&2
          exit 1
        fi
      - chmod +x "{{ .DIRCTL_BIN }}"
    status:
      - |
        set -eu
        if command -v sha256sum >/dev/null 2>&1; then
          [ "$(sha256sum "{{ .DIRCTL_BIN }}" | awk '{print $1}')" = "{{ .DIRCTL_SHA256 }}" ]
        else
          [ "$(shasum -a 256 "{{ .DIRCTL_BIN }}" | awk '{print $1}')" = "{{ .DIRCTL_SHA256 }}" ]
        fi

  deps:golangci-lint:
    desc: Install golangci-lint
    internal: true
    deps:
      - deps:bin-dir
    cmds:
      - curl -sSfL https://golangci-lint.run/install.sh | sh -s -- -b {{ .BIN_DIR }} v{{ .GOLANGCI_LINT_VERSION }}
      - mv {{ .BIN_DIR }}/golangci-lint {{ .GOLANGCI_LINT_BIN }}
      - chmod +x {{ .GOLANGCI_LINT_BIN }}
    status:
      - test -x {{ .GOLANGCI_LINT_BIN }}

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf {{ .BIN_DIR }}
