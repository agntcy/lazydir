version: "3"

vars:
  BIN_DIR: ./.bin
  BINARY: "{{ .BIN_DIR }}/lazydir"
  GOLANGCI_LINT_VERSION: "2.11.3"
  GOLANGCI_LINT_BIN: "{{ .BIN_DIR }}/golangci-lint-{{ .GOLANGCI_LINT_VERSION }}"

tasks:
  default:
    desc: Show available tasks
    cmd: task --list

  deps:
    desc: Download Go module dependencies
    cmds:
      - go mod download
    sources:
      - go.mod
      - go.sum

  build:
    desc: Build the lazydir binary into .bin/
    deps: [deps]
    cmds:
      - mkdir -p {{ .BIN_DIR }}
      - go build -o {{ .BINARY }} .
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{ .BINARY }}"

  run:
    desc: Build and start lazydir for testing (pass extra args via CLI_ARGS)
    deps: [build]
    cmds:
      - "{{ .BINARY }} {{ .CLI_ARGS }}"

  fmt:
    desc: Format Go source files
    cmds:
      - gofmt -s -w .

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  lint:
    desc: Run golangci-lint
    deps:
      - deps:golangci-lint
    vars:
      LINT_BIN: "{{ .ROOT_DIR }}/{{ .GOLANGCI_LINT_BIN }}"
    cmds:
      - "{{ .LINT_BIN }} run ./..."

  license:
    desc: Run license check
    cmds:
      - licensei cache
      - licensei check

  test:
    desc: Run all tests (unit)
    cmds:
      - task: test:unit

  test:unit:
    desc: Run unit tests
    cmds:
      - go test -count=1 ./...

  test:cover:
    desc: Run unit tests with coverage report
    cmds:
      - go test -race -coverprofile=coverage.out ./...

  check:
    desc: Run all checks (fmt, vet, lint, test) then build
    cmds:
      - task: fmt
      - task: vet
      - task: lint
      - task: test:unit
      - task: build

  deps:install:
    desc: Install development dependencies and git hooks
    cmds:
      - pre-commit install
    status:
      - test -f .git/hooks/pre-commit

  deps:bin-dir:
    internal: true
    cmds:
      - mkdir -p {{ .BIN_DIR }}
    status:
      - test -d {{ .BIN_DIR }}

  deps:golangci-lint:
    desc: Install golangci-lint
    internal: true
    deps:
      - deps:bin-dir
    cmds:
      - curl -sSfL https://golangci-lint.run/install.sh | sh -s -- -b {{ .BIN_DIR }} v{{ .GOLANGCI_LINT_VERSION }}
      - mv {{ .BIN_DIR }}/golangci-lint {{ .GOLANGCI_LINT_BIN }}
      - chmod +x {{ .GOLANGCI_LINT_BIN }}
    status:
      - test -x {{ .GOLANGCI_LINT_BIN }}

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf {{ .BIN_DIR }}
